services:
  db:
    image: postgres:16
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_PASSWORD=myodoo
      - POSTGRES_USER=odoo
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - odoo-db-data:/var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U odoo -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    image: odoo:18.0
    depends_on:
      db:
        condition: service_healthy
    environment:
      - HOST=db
      - USER=odoo
      - PASSWORD=myodoo
    volumes:
      - ./odoo.conf:/etc/odoo/odoo.conf:ro
      - odoo-web-data:/var/lib/odoo
      - ./extra-addons:/mnt/extra-addons:ro
      - ./init-odoo.sh:/init-odoo.sh:ro
    command:
      - /bin/bash
      - /init-odoo.sh

  web-frontend:
    image: odoo:18.0
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8069:8069"
    environment:
      - HOST=db
      - USER=odoo
      - PASSWORD=myodoo
    volumes:
      - ./odoo.conf:/etc/odoo/odoo.conf:ro
      - odoo-web-data:/var/lib/odoo
      - ./extra-addons:/mnt/extra-addons:ro
    command:
      - odoo
      - --database=odoo_demo
      - --db_host=db
      - --db_user=odoo
      - --db_password=myodoo

  exporter:
    image: python:3.12-slim
    depends_on:
      - db
    environment:
      - PGHOST=db
      - PGPORT=5432
      - PGDATABASE=odoo_demo
      - PGUSER=odoo
      - PGPASSWORD=myodoo
    volumes:
      - ./export_csv.py:/export_csv.py:ro
      - ./csv_export:/csv_export
    working_dir: /csv_export
    command:
      - sh
      - -c
      - |
        pip install -q psycopg2-binary && python /export_csv.py

volumes:
  odoo-web-data:
  odoo-db-data:
