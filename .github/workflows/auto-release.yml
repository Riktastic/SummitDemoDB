name: Automatic Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests python-dotenv Faker psycopg2-binary

      - name: Generate data
        run: |
          chmod +x run-all.sh
          ./run-all.sh --create-release

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            release/odoo_demo_csv_*.zip
            release/odoo_demo_*.sqlite
            release/sql/*.sql
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
